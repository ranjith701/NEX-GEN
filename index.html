<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEX-GEN Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyD34O_POEwS40AhVi01QLWIkYbU9Si6E7Q",
            authDomain: "nex-gen-46e49.firebaseapp.com",
            projectId: "nex-gen-46e49",
            storageBucket: "nex-gen-46e49.firebasestorage.app",
            messagingSenderId: "745169266255",
            appId: "1:745169266255:web:6798e993ff7c1027da6c3a"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function App() {
            const [isFirstTimeSetup, setIsFirstTimeSetup] = React.useState(false);
            const [currentRole, setCurrentRole] = React.useState('login'); 
            const [activeTab, setActiveTab] = React.useState('');
            const [loginError, setLoginError] = React.useState('');
            const [rememberMe, setRememberMe] = React.useState(false);
            
            const [usernameInput, setUsernameInput] = React.useState('');
            const [passwordInput, setPasswordInput] = React.useState('');

            // First time admin configuration states
            const [adminEmail, setAdminEmail] = React.useState('');
            const [adminPhone, setAdminPhone] = React.useState('');
            const [adminPassword, setAdminPassword] = React.useState('');

            // Customer Tracking View States
            const [searchQuery, setSearchQuery] = React.useState('');
            const [trackedJob, setTrackedJob] = React.useState(null);
            const [trackError, setTrackError] = React.useState('');

            const [allJobs, setAllJobs] = React.useState([]);
            const [technicians, setTechnicians] = React.useState([]);
            const [usersList, setUsersList] = React.useState([]);
            const [formData, setFormData] = React.useState({ brand:'', model:'', condition:'', cost:'', custPhone:'', custName:'', issueDesc:'' });

            React.useEffect(() => {
                db.collection("users").get().then((snap) => {
                    if (snap.empty) setIsFirstTimeSetup(true);
                });
            }, []);

            React.useEffect(() => {
                return auth.onAuthStateChanged(async (currentUser) => {
                    if (currentUser) {
                        const emailPrefix = currentUser.email.split('@')[0];
                        
                        // Check if registered via phone prefix or direct email prefix matching logic
                        let userDoc = await db.collection("users").doc(emailPrefix).get();
                        
                        if (!userDoc.exists) {
                            // Secondary fallback scan if document name matches email key directly
                            userDoc = await db.collection("users").doc(currentUser.email.replace(/[.#$\[\]]/g, "_")).get();
                        }

                        if (userDoc.exists) {
                            const data = userDoc.data();
                            setCurrentRole(data.role);
                            if (data.role === 'admin' || data.role === 'developer') setActiveTab('create-job');
                            else if (data.role === 'technician') setActiveTab('available-jobs');
                        }
                    } else {
                        setCurrentRole('login');
                        setActiveTab('');
                    }
                });
            }, []);

            React.useEffect(() => {
                if (currentRole === 'login' || currentRole === 'customer') return;

                const unsubscribeJobs = db.collection("repair_jobs").onSnapshot((snap) => {
                    setAllJobs(snap.docs.map(d => d.data()));
                });

                const unsubscribeUsers = db.collection("users").onSnapshot((snap) => {
                    const users = snap.docs.map(d => d.data());
                    setUsersList(users);
                    setTechnicians(users.filter(u => u.role === 'technician'));
                });

                return () => { unsubscribeJobs(); unsubscribeUsers(); };
            }, [currentRole]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                const input = usernameInput.trim();

                if (isFirstTimeSetup) {
                    if (input === 'admin' && passwordInput === 'admin') {
                        setCurrentRole('setup-admin');
                        return;
                    } else {
                        setLoginError('First time login. Use username "admin" and password "admin".');
                        return;
                    }
                }

                let targetLogin = input;
                if (/^\d{10}$/.test(input)) {
                    targetLogin = `${input}@rkmobiles.com`;
                }

                try {
                    await auth.signInWithEmailAndPassword(targetLogin, passwordInput);
                } catch (err) {
                    setLoginError('Wrong username or password.');
                }
            };

            const handleRegisterAdmin = async (e) => {
                e.preventDefault();
                const cleanEmail = adminEmail.trim();
                const cleanPhone = adminPhone.trim();

                if (!/^\d{10}$/.test(cleanPhone)) {
                    alert("Enter a valid 10-digit phone number.");
                    return;
                }

                try {
                    const userCredential = await auth.createUserWithEmailAndPassword(cleanEmail, adminPassword);
                    
                    await db.collection("users").doc(cleanPhone).set({
                        uid: userCredential.user.uid,
                        name: "Master Admin",
                        email: cleanEmail,
                        mobile: cleanPhone,
                        role: "admin",
                        created_at: new Date().toISOString()
                    });

                    alert("Admin account created successfully.");
                    setIsFirstTimeSetup(false);
                    setCurrentRole('admin');
                    setActiveTab('create-job');
                } catch(err) {
                    alert("Error: " + err.message);
                }
            };

            const handleCustomerTrack = async () => {
                setTrackError('');
                setTrackedJob(null);
                const queryVal = searchQuery.trim();

                try {
                    let match = null;
                    if (queryVal.toUpperCase().startsWith('JOB-')) {
                        const snap = await db.collection("repair_jobs").where("job_card_id", "==", queryVal.toUpperCase()).get();
                        if (!snap.empty) match = snap.docs[0].data();
                    } else {
                        const snap = await db.collection("repair_jobs").where("customer_phone", "==", queryVal).get();
                        if (!snap.empty) match = snap.docs[0].data();
                    }

                    if (match) setTrackedJob(match);
                    else setTrackError('No active repair record found.');
                } catch (err) {
                    setTrackError('Error querying database.');
                }
            };

            const handleCreateJobCard = async (e) => {
                e.preventDefault();
                const jobCardId = `JOB-${Math.floor(10000 + Math.random() * 90000)}`;

                await db.collection("repair_jobs").doc(jobCardId).set({
                    job_card_id: jobCardId,
                    brand: formData.brand,
                    model: formData.model,
                    condition: formData.condition,
                    repaired_cost: formData.cost,
                    customer_name: formData.custName,
                    customer_phone: formData.custPhone,
                    issue_description: formData.issueDesc,
                    status: 'Pending',
                    assigned_tech_id: '',
                    tech_notes: '',
                    created_at: new Date().toISOString()
                });

                alert(`Job Card Created: ${jobCardId}`);
                setFormData({ brand:'', model:'', condition:'', cost:'', custPhone:'', custName:'', issueDesc:'' });
            };

            const claimDevice = async (id) => {
                await db.collection("repair_jobs").doc(id).update({ status: 'Under Process', assigned_tech_id: auth.currentUser.uid });
            };
            const transferDevice = async (id, techId) => {
                if(!techId) return;
                await db.collection("repair_jobs").doc(id).update({ assigned_tech_id: techId });
                alert('Mobile transferred.');
            };
            const updateDeviceStatus = async (id, stat, notes) => {
                await db.collection("repair_jobs").doc(id).update({ status: stat, tech_notes: notes });
                alert('Status updated.');
            };

            if (currentRole === 'login') {
                return (
                    <div class="min-h-screen flex items-center justify-center p-4">
                        <div class="max-w-4xl w-full grid md:grid-cols-2 gap-8 bg-white p-8 rounded-xl shadow border">
                            
                            {/* Left View: Customer Public Tracker Layout */}
                            <div class="space-y-4 border-b md:border-b-0 md:border-r pb-6 md:pb-0 md:pr-8 flex flex-col justify-center">
                                <h1 class="text-3xl font-bold text-blue-600">NEX-GEN</h1>
                                <p class="text-gray-500 text-sm">Track your phone repair status live</p>
                                <div class="space-y-2 pt-2">
                                    <input type="text" placeholder="Job Card ID or Mobile Number" value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} class="w-full p-2 border rounded outline-none focus:ring-2 focus:ring-blue-500" />
                                    <button onClick={handleCustomerTrack} class="w-full bg-blue-600 text-white font-bold py-2 rounded">Track Status</button>
                                </div>

                                {trackError && <div class="p-2 bg-red-100 text-red-700 text-xs rounded">{trackError}</div>}
                                
                                {trackedJob && (
                                    <div class="p-4 bg-gray-50 border rounded space-y-2 text-sm">
                                        <div class="flex justify-between border-b pb-1"><span class="text-gray-500">Brand:</span><span class="font-bold">{trackedJob.brand}</span></div>
                                        <div class="flex justify-between border-b pb-1"><span class="text-gray-500">Model:</span><span class="font-bold">{trackedJob.model}</span></div>
                                        <div class="flex justify-between border-b pb-1"><span class="text-gray-500">Condition:</span><span>{trackedJob.condition}</span></div>
                                        <div class="flex justify-between border-b pb-1"><span class="text-gray-500">Repair Status:</span><span class="px-2 py-0.5 rounded text-xs font-bold bg-amber-100 text-amber-800 uppercase">{trackedJob.status}</span></div>
                                        <div class="flex justify-between pt-1 text-base font-bold text-emerald-600"><span>Repaired Cost:</span><span>₹{trackedJob.repaired_cost}</span></div>
                                    </div>
                                )}
                            </div>

                            {/* Right View: Login Dashboard Frame */}
                            <form onSubmit={handleLogin} class="space-y-4 flex flex-col justify-center">
                                <h3 class="text-xl font-bold text-gray-800">Staff Access Portal</h3>
                                
                                {isFirstTimeSetup && <div class="text-center text-xs font-bold text-amber-800 bg-amber-100 p-2 rounded">First-Time Setup Mode Active</div>}
                                {loginError && <div class="p-3 bg-red-100 text-red-700 text-sm rounded">{loginError}</div>}

                                <input type="text" required value={usernameInput} onChange={(e)=>setUsernameInput(e.target.value)} placeholder={isFirstTimeSetup ? "Enter 'admin'" : "Email or 10-Digit Phone"} class="w-full p-2 border rounded outline-none focus:ring-2 focus:ring-blue-500" />
                                <input type="password" required value={passwordInput} onChange={(e)=>setPasswordInput(e.target.value)} placeholder={isFirstTimeSetup ? "Enter 'admin'" : "Password"} class="w-full p-2 border rounded outline-none focus:ring-2 focus:ring-blue-500" />
                                
                                <label class="flex items-center space-x-2 text-sm text-gray-600">
                                    <input type="checkbox" checked={rememberMe} onChange={(e)=>setRememberMe(e.target.checked)} class="rounded text-blue-600" />
                                    <span>Remember me</span>
                                </label>

                                <button type="submit" class="w-full bg-gray-900 text-white font-bold py-2 rounded hover:bg-black transition">Login</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (currentRole === 'setup-admin') {
                return (
                    <div class="min-h-screen flex items-center justify-center p-4">
                        <form onSubmit={handleRegisterAdmin} class="max-w-md w-full bg-white p-8 rounded-xl shadow border space-y-4">
                            <h2 class="text-xl font-bold text-gray-800">Create Admin Account</h2>
                            <p class="text-sm text-gray-500">Provide both email and phone number setup configurations.</p>
                            
                            <input type="email" required value={adminEmail} onChange={(e)=>setAdminEmail(e.target.value)} placeholder="Admin Email Address" class="w-full p-2 border rounded" />
                            <input type="tel" required value={adminPhone} onChange={(e)=>setAdminPhone(e.target.value)} placeholder="Admin 10-Digit Phone Number" class="w-full p-2 border rounded" />
                            <input type="password" required minlength="6" value={adminPassword} onChange={(e)=>setAdminPassword(e.target.value)} placeholder="Password (Min 6 characters)" class="w-full p-2 border rounded" />
                            
                            <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded font-bold hover:bg-purple-700 transition">Save Admin</button>
                        </form>
                    </div>
                );
            }

            if (currentRole === 'admin' || currentRole === 'developer') {
                return (
                    <div class="min-h-screen flex flex-col md:flex-row bg-gray-50">
                        <div class="w-full md:w-64 bg-slate-900 text-white p-4 space-y-2">
                            <h2 class="text-xl font-bold text-blue-400 p-2 mb-6">NEX-GEN Admin</h2>
                            {['create-job', 'tech-mgmt', 'user-mgmt', 'brand-mgmt', 'tracking'].map((tab) => (
                                <button key={tab} onClick={()=>setActiveTab(tab)} class={`w-full text-left px-4 py-2 rounded capitalize ${activeTab === tab ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>
                                    {tab.replace('-', ' ')}
                                </button>
                            ))}
                            <button onClick={()=>auth.signOut()} class="w-full text-left px-4 py-2 mt-12 text-red-400 hover:bg-slate-800 rounded">Logout</button>
                        </div>

                        <div class="flex-1 p-6">
                            <div class="bg-white rounded p-6 min-h-[500px] shadow">
                                {activeTab === 'create-job' && (
                                    <form onSubmit={handleCreateJobCard} class="space-y-4 max-w-lg">
                                        <h3 class="text-xl font-bold border-b pb-2 mb-4">Create Job Card</h3>
                                        <div class="grid grid-cols-2 gap-4">
                                            <input type="text" placeholder="Brand Name" required value={formData.brand} onChange={(e)=>setFormData({...formData, brand: e.target.value})} class="p-2 border rounded" />
                                            <input type="text" placeholder="Model Name" required value={formData.model} onChange={(e)=>setFormData({...formData, model: e.target.value})} class="p-2 border rounded" />
                                        </div>
                                        <input type="text" placeholder="Condition" required value={formData.condition} onChange={(e)=>setFormData({...formData, condition: e.target.value})} class="w-full p-2 border rounded" />
                                        <input type="text" placeholder="Repaired Cost" required value={formData.cost} onChange={(e)=>setFormData({...formData, cost: e.target.value})} class="w-full p-2 border rounded" />
                                        <div class="grid grid-cols-2 gap-4">
                                            <input type="text" placeholder="Customer Name" required value={formData.custName} onChange={(e)=>setFormData({...formData, custName: e.target.value})} class="p-2 border rounded" />
                                            <input type="tel" placeholder="Customer Phone Number" required value={formData.custPhone} onChange={(e)=>setFormData({...formData, custPhone: e.target.value})} class="p-2 border rounded" />
                                        </div>
                                        <textarea placeholder="Issue Description" required rows="3" value={formData.issueDesc} onChange={(e)=>setFormData({...formData, issueDesc: e.target.value})} class="w-full p-2 border rounded"></textarea>
                                        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded">Save Job Card</button>
                                    </form>
                                )}

                                {activeTab === 'tech-mgmt' && (
                                    <div>
                                        <h3 class="text-xl font-bold border-b pb-2 mb-4">Technician Management</h3>
                                        <div class="space-y-2">
                                            {technicians.map((t, idx) => (
                                                <div key={idx} class="p-3 border rounded bg-gray-50 flex justify-between">
                                                    <span class="font-bold text-gray-700">{t.name}</span>
                                                    <span class="text-gray-500 text-sm">{t.email || t.mobile}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'user-mgmt' && (
                                    <div>
                                        <h3 class="text-xl font-bold border-b pb-2 mb-4">User Management</h3>
                                        <form onSubmit={async (e) => {
                                            e.preventDefault();
                                            const name = e.target.uName.value.trim();
                                            const type = e.target.uType.value;
                                            const cred = e.target.uCred.value.trim();
                                            const pass = e.target.uPass.value;
                                            const role = e.target.uRole.value;

                                            let fEmail = cred;
                                            let fMobile = '';
                                            if(type === 'mobile') {
                                                fEmail = `${cred}@rkmobiles.com`;
                                                fMobile = cred;
                                            }

                                            try {
                                                const dKey = type === 'mobile' ? fMobile : fEmail.replace(/[.#$\[\]]/g, "_");
                                                await db.collection("users").doc(dKey).set({
                                                    uid: dKey, name, email: fEmail, mobile: fMobile, role, login_type: type, created_at: new Date().toISOString()
                                                });
                                                alert("User created successfully.");
                                                e.target.reset();
                                            } catch(err) { alert("Error creating user profile."); }
                                        }} class="bg-slate-50 p-4 border rounded space-y-4 max-w-md">
                                            <input type="text" name="uName" placeholder="Name" required class="w-full p-2 border bg-white rounded" />
                                            <div class="grid grid-cols-2 gap-2">
                                                <select name="uType" class="p-2 border bg-white rounded">
                                                    <option value="email">Email</option>
                                                    <option value="mobile">Phone Number</option>
                                                </select>
                                                <input type="text" name="uCred" placeholder="Email or Phone Number" required class="p-2 border bg-white rounded" />
                                            </div>
                                            <input type="password" name="uPass" placeholder="Password" required class="w-full p-2 border bg-white rounded" />
                                            <select name="uRole" class="w-full p-2 border bg-white rounded">
                                                <option value="technician">Technician</option>
                                                <option value="admin">Admin</option>
                                                <option value="developer">Developer</option>
                                            </select>
                                            <button type="submit" class="w-full bg-purple-600 text-white py-2 rounded font-bold">Add User</button>
                                        </form>
                                    </div>
                                )}

                                {activeTab === 'brand-mgmt' && (
                                    <div>
                                        <h3 class="text-xl font-bold border-b pb-2 mb-4">Brand and Model Management</h3>
                                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                                            {allJobs.map((j, i) => (
                                                <div key={i} class="p-3 bg-slate-50 border rounded font-medium">
                                                    {j.brand} - <span class="text-blue-600 font-bold">{j.model}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'tracking' && (
                                    <div>
                                        <h3 class="text-xl font-bold border-b pb-2 mb-4">Tracking Dashboard</h3>
                                        <div class="space-y-2">
                                            {allJobs.map(j => (
                                                <div key={j.job_card_id} class="p-3 border rounded flex justify-between items-center bg-gray-50 shadow-sm">
                                                    <div>
                                                        <span class="font-bold text-blue-600">{j.job_card_id}</span> - <span class="font-bold">{j.brand} {j.model}</span>
                                                        <div class="text-xs text-gray-500 mt-0.5">Issue: {j.issue_description}</div>
                                                    </div>
                                                    <span class="px-2.5 py-1 text-xs font-bold rounded bg-blue-100 text-blue-800 uppercase">{j.status}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            if (currentRole === 'technician') {
                return (
                    <div class="min-h-screen flex flex-col md:flex-row bg-gray-50">
                        <div class="w-full md:w-64 bg-emerald-950 text-white p-4 space-y-2">
                            <h2 class="text-xl font-bold text-emerald-400 p-2 mb-6">NEX-GEN Technician</h2>
                            {['available-jobs', 'transfer-desk', 'status-updater'].map((tab) => (
                                <button key={tab} onClick={()=>setActiveTab(tab)} class={`w-full text-left px-4 py-2 rounded capitalize ${activeTab === tab ? 'bg-emerald-700' : 'hover:bg-emerald-900'}`}>
                                    {tab.replace('-', ' ')}
                                </button>
                            ))}
                            <button onClick={()=>auth.signOut()} class="w-full text-left px-4 py-2 mt-12 text-red-300 hover:bg-emerald-900 rounded">Logout</button>
                        </div>

                        <div class="flex-1 p-6">
                            <div class="bg-white rounded p-6 min-h-[500px] shadow">
                                {activeTab === 'available-jobs' && (
                                    <div>
                                        <h3 class="text-xl font-bold border-b pb-2 mb-4">Available Repair Mobile</h3>
                                        <div class="grid gap-4 md:grid-cols-2">
                                            {allJobs.filter(j => j.status === 'Pending').map(job => (
                                                <div key={job.job_card_id} class="p-4 border rounded bg-slate-50 flex flex-col justify-between shadow-sm">
                                                    <div>
                                                        <div class="font-bold text-lg text-gray-800">{job.brand} {job.model}</div>
                                                        <div class="text-sm text-red-600 font-medium my-1">Issue: {job.issue_description}</div>
                                                    </div>
                                                    <button onClick={()=>claimDevice(job.job_card_id)} class="mt-3 w-full bg-emerald-600 text-white py-1.5 rounded font-bold text-sm">Claim Mobile</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'transfer-desk' && (
                                    <div>
                                        <h3 class="text-xl font-bold border-b pb-2 mb-4">Transfer Mobile</h3>
                                        <div class="space-y-2">
                                            {allJobs.filter(j => j.status === 'Under Process' && j.assigned_tech_id === auth.currentUser.uid).map(job => (
                                                <div key={job.job_card_id} class="p-4 border rounded flex justify-between items-center bg-gray-50">
                                                    <span class="font-bold">{job.job_card_id} - {job.brand} {job.model}</span>
                                                    <select onChange={(e)=>transferDevice(job.job_card_id, e.target.value)} class="p-1.5 border bg-white rounded text-xs">
                                                        <option value="">Select Technician...</option>
                                                        {technicians.filter(t => t.uid !== auth.currentUser.uid).map(t => (
                                                            <option key={t.uid} value={t.uid}>{t.name}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'status-updater' && (
                                    <div>
                                        <h3 class="text-xl font-bold border-b pb-2 mb-4">Status Update</h3>
                                        <div class="space-y-4">
                                            {allJobs.filter(j => j.status === 'Under Process' && j.assigned_tech_id === auth.currentUser.uid).map(job => {
                                                let noteInputBuffer = '';
                                                return (
                                                    <div key={job.job_card_id} class="p-4 border rounded bg-slate-50 space-y-3">
                                                        <div class="font-bold">{job.job_card_id} — {job.brand} {job.model}</div>
                                                        <input type="text" placeholder="Repair Notes" onChange={(e)=>noteInputBuffer = e.target.value} class="w-full p-2 border bg-white rounded text-sm" />
                                                        <div class="flex space-x-2">
                                                            <button onClick={()=>updateDeviceStatus(job.job_card_id, 'Ready', noteInputBuffer)} class="flex-1 bg-green-600 text-white py-1.5 rounded font-bold">Mark as Ready</button>
                                                            <button onClick={()=>updateDeviceStatus(job.job_card_id, 'Returned', noteInputBuffer)} class="flex-1 bg-red-600 text-white py-1.5 rounded font-bold">Mark as Returned</button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
